default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host: localhost
  port: 5432
  username: postgres
  password: postgres
  database: bills_agent_dev

test:
  <<: *default
  host: localhost
  port: 5432
  username: postgres
  password: postgres
  database: bills_agent_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>

  cache:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cache_migrate

  queue:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/queue_migrate

  cable:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cable_migrate